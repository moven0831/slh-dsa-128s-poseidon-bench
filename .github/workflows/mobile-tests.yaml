name: mobile-build

on:
    push:
        branches:
            - main
        paths:
            - "wallet-unit-poc/mobile/**"
            - "wallet-unit-poc/ecdsa-spartan2/**"
            - "wallet-unit-poc/circom/circuits/**"
            - ".github/workflows/mobile-tests.yaml"
    pull_request:
        paths:
            - "wallet-unit-poc/mobile/**"
            - "wallet-unit-poc/ecdsa-spartan2/**"
            - "wallet-unit-poc/circom/circuits/**"
            - ".github/workflows/mobile-tests.yaml"
    workflow_dispatch:

jobs:
    compile-circuits:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install --yes \
                    build-essential \
                    libgmp-dev \
                    libsodium-dev \
                    nasm \
                    nlohmann-json3-dev

            - name: Download Circom Binary v2.2.3
              run: |
                  wget -qO /home/runner/work/circom https://github.com/iden3/circom/releases/download/v2.2.3/circom-linux-amd64
                  chmod +x /home/runner/work/circom
                  sudo mv /home/runner/work/circom /bin/circom

            - name: Print Circom version
              run: circom --version

            - name: Install JS dependencies
              run: cd wallet-unit-poc/circom && yarn

            - name: Compile sha256rsa2048 circuit
              run: cd wallet-unit-poc/circom && yarn compile:sha256rsa2048

            - name: Compile sha256rsa4096 circuit
              run: cd wallet-unit-poc/circom && yarn compile:sha256rsa4096

            - name: Upload circuit C++ artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: circuit-cpp
                  path: |
                      wallet-unit-poc/circom/build/cpp/sha256rsa2048.cpp
                      wallet-unit-poc/circom/build/cpp/sha256rsa2048.dat
                      wallet-unit-poc/circom/build/cpp/sha256rsa4096.cpp
                      wallet-unit-poc/circom/build/cpp/sha256rsa4096.dat
                  retention-days: 1

            - name: Upload sha256rsa2048 R1CS artifact
              uses: actions/upload-artifact@v4
              with:
                  name: circuit-r1cs-sha256rsa2048
                  path: wallet-unit-poc/circom/build/sha256rsa2048/sha256rsa2048_js/sha256rsa2048.r1cs
                  retention-days: 1

            - name: Upload sha256rsa4096 R1CS artifact
              uses: actions/upload-artifact@v4
              with:
                  name: circuit-r1cs-sha256rsa4096
                  path: wallet-unit-poc/circom/build/sha256rsa4096/sha256rsa4096_js/sha256rsa4096.r1cs
                  retention-days: 1

    compile-circuits-macos:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install system dependencies
              run: |
                  brew install nasm

            - name: Download Circom Binary v2.2.3
              run: |
                  sudo wget -O ~/.cargo/bin/circom https://github.com/iden3/circom/releases/download/v2.2.3/circom-macos-amd64
                  sudo chmod +x ~/.cargo/bin/circom

            - name: Print Circom version
              run: circom --version

            - name: Install JS dependencies
              run: cd wallet-unit-poc/circom && yarn

            - name: Compile sha256rsa2048 circuit
              run: cd wallet-unit-poc/circom && yarn compile:sha256rsa2048

            - name: Compile sha256rsa4096 circuit
              run: cd wallet-unit-poc/circom && yarn compile:sha256rsa4096

            - name: Upload circuit C++ artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: circuit-cpp-macos
                  path: |
                      wallet-unit-poc/circom/build/cpp/sha256rsa2048.cpp
                      wallet-unit-poc/circom/build/cpp/sha256rsa2048.dat
                      wallet-unit-poc/circom/build/cpp/sha256rsa4096.cpp
                      wallet-unit-poc/circom/build/cpp/sha256rsa4096.dat
                  retention-days: 1

            - name: Upload sha256rsa2048 R1CS artifact
              uses: actions/upload-artifact@v4
              with:
                  name: circuit-r1cs-sha256rsa2048-macos
                  path: wallet-unit-poc/circom/build/sha256rsa2048/sha256rsa2048_js/sha256rsa2048.r1cs
                  retention-days: 1

            - name: Upload sha256rsa4096 R1CS artifact
              uses: actions/upload-artifact@v4
              with:
                  name: circuit-r1cs-sha256rsa4096-macos
                  path: wallet-unit-poc/circom/build/sha256rsa4096/sha256rsa4096_js/sha256rsa4096.r1cs
                  retention-days: 1

    rust-tests:
        needs: compile-circuits
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v5

            - name: Download circuit C++ artifacts
              uses: actions/download-artifact@v4
              with:
                  name: circuit-cpp
                  path: wallet-unit-poc/circom/build/cpp/

            - name: Download sha256rsa2048 R1CS artifact
              uses: actions/download-artifact@v4
              with:
                  name: circuit-r1cs-sha256rsa2048
                  path: wallet-unit-poc/circom/build/sha256rsa2048/sha256rsa2048_js/

            - name: Download sha256rsa4096 R1CS artifact
              uses: actions/download-artifact@v4
              with:
                  name: circuit-r1cs-sha256rsa4096
                  path: wallet-unit-poc/circom/build/sha256rsa4096/sha256rsa4096_js/

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install --yes \
                    build-essential \
                    libgmp-dev \
                    libsodium-dev \
                    nasm \
                    nlohmann-json3-dev

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Cargo registry and git
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                  key: rust-tests-cargo-${{ hashFiles('wallet-unit-poc/ecdsa-spartan2/Cargo.lock') }}
                  restore-keys: |
                      rust-tests-cargo-

            - name: Generate circuit input (sha256rsa2048)
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  cargo run --release --features sha256rsa2048 -- rs256 generate-input

            - name: Run e2e flow (sha256rsa2048)
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  cargo run --release --features sha256rsa2048 -- rs256 setup --input ../circom/inputs/sha256rsa2048/input.json
                  cargo run --release --features sha256rsa2048 -- rs256 prove --input ../circom/inputs/sha256rsa2048/input.json
                  cargo run --release --features sha256rsa2048 -- rs256 verify

            - name: Generate circuit input (sha256rsa4096)
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  cargo run --release --features sha256rsa4096 -- rs256 generate-input --fido

            - name: Run e2e flow (sha256rsa4096)
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  cargo run --release --features sha256rsa4096 -- rs256 setup --fido --input ../circom/inputs/sha256rsa4096/input.json
                  cargo run --release --features sha256rsa4096 -- rs256 prove --fido --input ../circom/inputs/sha256rsa4096/input.json
                  cargo run --release --features sha256rsa4096 -- rs256 verify --fido

            - name: Run ecdsa-spartan2 unit tests
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  cargo test --release

            - name: Run mobile API tests
              run: |
                  cd wallet-unit-poc/mobile
                  cargo test --release --no-default-features --lib

            - name: Create ZIP of sha256rsa2048 proving key
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2/keys
                  zip rs256_proving.key.zip rs256_proving.key

            - name: Create ZIP of sha256rsa2048 verifying key
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2/keys
                  zip rs256_verifying.key.zip rs256_verifying.key

            - name: Create ZIP of sha256rsa4096 proving key
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2/keys
                  zip rs256_4096_proving.key.zip rs256_4096_proving.key

            - name: Create ZIP of sha256rsa4096 verifying key
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2/keys
                  zip rs256_4096_verifying.key.zip rs256_4096_verifying.key

            - name: Create ZIP of sha256rsa2048 R1CS artifact
              run: |
                  cd wallet-unit-poc/circom/build/sha256rsa2048/sha256rsa2048_js
                  zip -r sha256rsa2048.r1cs.zip sha256rsa2048.r1cs

            - name: Create ZIP of sha256rsa4096 R1CS artifact
              run: |
                  cd wallet-unit-poc/circom/build/sha256rsa4096/sha256rsa4096_js
                  zip -r sha256rsa4096.r1cs.zip sha256rsa4096.r1cs

            - name: Upload key ZIPs to GitHub Release
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest
                  files: |
                      wallet-unit-poc/ecdsa-spartan2/keys/rs256_proving.key.zip
                      wallet-unit-poc/ecdsa-spartan2/keys/rs256_verifying.key.zip
                      wallet-unit-poc/ecdsa-spartan2/keys/rs256_4096_proving.key.zip
                      wallet-unit-poc/ecdsa-spartan2/keys/rs256_4096_verifying.key.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload sha256rsa2048 R1CS to GitHub Release
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest
                  files: wallet-unit-poc/circom/build/sha256rsa2048/sha256rsa2048_js/sha256rsa2048.r1cs.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload sha256rsa4096 R1CS to GitHub Release
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest
                  files: wallet-unit-poc/circom/build/sha256rsa4096/sha256rsa4096_js/sha256rsa4096.r1cs.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build-ios:
        needs: compile-circuits
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v5

            - name: Download circuit artifacts
              uses: actions/download-artifact@v4
              with:
                  name: circuit-cpp
                  path: wallet-unit-poc/circom/build/cpp/

            - name: Verify circuit artifacts
              run: ls -la wallet-unit-poc/circom/build/cpp/

            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: stable

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-apple-ios-sim

            - name: Cache Cargo registry and git
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                  key: ios-cargo-${{ hashFiles('wallet-unit-poc/mobile/**/Cargo.lock', 'wallet-unit-poc/mobile/**/Cargo.toml', 'wallet-unit-poc/ecdsa-spartan2/Cargo.lock') }}
                  restore-keys: |
                      ios-cargo-

            - name: Cache GMP prebuild
              uses: actions/cache@v4
              with:
                  path: wallet-unit-poc/mobile/.build-cache/
                  key: ios-gmp-${{ hashFiles('wallet-unit-poc/mobile/scripts/prebuild-ios-gmp.sh') }}
                  restore-keys: |
                      ios-gmp-

            - name: Cache CocoaPods
              uses: actions/cache@v4
              with:
                  path: wallet-unit-poc/mobile/flutter/ios/Pods
                  key: ios-pods-${{ hashFiles('wallet-unit-poc/mobile/flutter/ios/Podfile.lock') }}
                  restore-keys: |
                      ios-pods-

            - name: Flutter pub get
              run: cd wallet-unit-poc/mobile/flutter && flutter pub get

            - name: Build iOS (simulator)
              run: cd wallet-unit-poc/mobile/flutter && flutter build ios --simulator --no-codesign

    build-android:
        needs: compile-circuits
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - name: Download circuit artifacts
              uses: actions/download-artifact@v4
              with:
                  name: circuit-cpp
                  path: wallet-unit-poc/circom/build/cpp/

            - name: Verify circuit artifacts
              run: ls -la wallet-unit-poc/circom/build/cpp/

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install --yes \
                    build-essential \
                    libgmp-dev \
                    libsodium-dev \
                    nasm \
                    nlohmann-json3-dev

            - name: Set up Java 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Set up Android NDK r26d
              uses: nttld/setup-ndk@v1
              with:
                  ndk-version: r26d
                  link-to-sdk: true

            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: stable

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-linux-android,x86_64-linux-android,armv7-linux-androideabi

            - name: Cache Cargo registry and git
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                  key: android-cargo-${{ hashFiles('wallet-unit-poc/mobile/**/Cargo.lock', 'wallet-unit-poc/mobile/**/Cargo.toml', 'wallet-unit-poc/ecdsa-spartan2/Cargo.lock') }}
                  restore-keys: |
                      android-cargo-

            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: android-gradle-${{ hashFiles('wallet-unit-poc/mobile/flutter/android/**/*.gradle*', 'wallet-unit-poc/mobile/flutter/android/gradle/wrapper/gradle-wrapper.properties') }}
                  restore-keys: |
                      android-gradle-

            - name: Flutter pub get
              run: cd wallet-unit-poc/mobile/flutter && flutter pub get

            - name: Build Android APK (debug)
              run: cd wallet-unit-poc/mobile/flutter && flutter build apk --debug

    build-ios-bindings:
        needs: compile-circuits-macos
        runs-on: macos-latest

        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Download circuit artifacts
              uses: actions/download-artifact@v4
              with:
                  name: circuit-cpp-macos
                  path: wallet-unit-poc/circom/build/cpp/

            - name: Verify circuit artifacts
              run: ls -la wallet-unit-poc/circom/build/cpp/

            - name: Install system dependencies
              run: |
                  brew install nasm

            - name: Build iOS bindings
              run: |
                  cd wallet-unit-poc/mobile
                  IOS_ARCHS=aarch64-apple-ios,aarch64-apple-ios-sim CONFIGURATION=release cargo run --bin ios

            - name: Create ZIP of xcframework
              run: |
                  cd wallet-unit-poc/mobile/MoproiOSBindings
                  zip -r MoproBindings.xcframework.zip MoproBindings.xcframework

            - name: Upload release xcframework to GitHub Release
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest
                  files: |
                      wallet-unit-poc/mobile/MoproiOSBindings/MoproBindings.xcframework.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload release swift to GitHub Release
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest
                  files: |
                      wallet-unit-poc/mobile/MoproiOSBindings/mopro.swift
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build-android-bindings:
        needs: compile-circuits
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Download circuit artifacts
              uses: actions/download-artifact@v4
              with:
                  name: circuit-cpp
                  path: wallet-unit-poc/circom/build/cpp/

            - name: Verify circuit artifacts
              run: ls -la wallet-unit-poc/circom/build/cpp/

            - name: Install Linux dependencies
              uses: awalsh128/cache-apt-pkgs-action@v1
              with:
                  packages: curl xz-utils build-essential cmake m4 nasm libstdc++6 protobuf-compiler
                  version: 1.0

            - name: Build Android bindings
              run: |
                  cd wallet-unit-poc/mobile
                  ANDROID_ARCHS=aarch64-linux-android CONFIGURATION=release cargo run --bin android -vvv

            - name: Create ZIP of xcframework
              run: |
                  cd wallet-unit-poc/mobile
                  zip -r MoproAndroidBindings.zip MoproAndroidBindings

            - name: Upload release assets to GitHub Release
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest
                  files: |
                      wallet-unit-poc/mobile/MoproAndroidBindings.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
