# Runs ecdsa-spartan2 unit tests and the full split-circuit E2E flows (RS2048 + RS4096).
# Compiles circuits internally to remain self-contained (circom-tests.yaml compiles them too;
# duplication accepted so this workflow can be re-run independently from the Actions UI).
# Uploads proving/verifying keys and R1CS as a GitHub Release on pushes to main.
name: rust-tests

on:
    push:
        branches:
            - main
        paths:
            - "wallet-unit-poc/ecdsa-spartan2/**"
            - "wallet-unit-poc/circom/circuits/**"
            - ".github/workflows/rust-tests.yaml"
    pull_request:
        paths:
            - "wallet-unit-poc/ecdsa-spartan2/**"
            - "wallet-unit-poc/circom/circuits/**"
            - ".github/workflows/rust-tests.yaml"
    workflow_dispatch:

jobs:
    compile-circuits:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install --yes \
                    build-essential \
                    libgmp-dev \
                    libsodium-dev \
                    nasm \
                    nlohmann-json3-dev

            - name: Download Circom Binary v2.2.3
              run: |
                  wget -qO /home/runner/work/circom https://github.com/iden3/circom/releases/download/v2.2.3/circom-linux-amd64
                  chmod +x /home/runner/work/circom
                  sudo mv /home/runner/work/circom /bin/circom

            - name: Print Circom version
              run: circom --version

            - name: Install JS dependencies
              run: cd wallet-unit-poc/circom && yarn

            - name: Compile all circuits
              run: cd wallet-unit-poc/circom && yarn compile:all

            - name: Upload circuit C++ artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: circuit-cpp
                  path: |
                      wallet-unit-poc/circom/build/cpp/cert_chain_rs2048.cpp
                      wallet-unit-poc/circom/build/cpp/cert_chain_rs2048.dat
                      wallet-unit-poc/circom/build/cpp/cert_chain_rs4096.cpp
                      wallet-unit-poc/circom/build/cpp/cert_chain_rs4096.dat
                      wallet-unit-poc/circom/build/cpp/device_sig_rs2048.cpp
                      wallet-unit-poc/circom/build/cpp/device_sig_rs2048.dat
                  retention-days: 1

            - name: Upload cert_chain_rs2048 R1CS artifact
              uses: actions/upload-artifact@v4
              with:
                  name: circuit-r1cs-cert-chain-rs2048
                  path: wallet-unit-poc/circom/build/cert_chain_rs2048/cert_chain_rs2048_js/cert_chain_rs2048.r1cs
                  retention-days: 1

            - name: Upload cert_chain_rs4096 R1CS artifact
              uses: actions/upload-artifact@v4
              with:
                  name: circuit-r1cs-cert-chain-rs4096
                  path: wallet-unit-poc/circom/build/cert_chain_rs4096/cert_chain_rs4096_js/cert_chain_rs4096.r1cs
                  retention-days: 1

            - name: Upload device_sig_rs2048 R1CS artifact
              uses: actions/upload-artifact@v4
              with:
                  name: circuit-r1cs-device-sig-rs2048
                  path: wallet-unit-poc/circom/build/device_sig_rs2048/device_sig_rs2048_js/device_sig_rs2048.r1cs
                  retention-days: 1

    rust-tests:
        needs: compile-circuits
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v5

            - name: Download circuit C++ artifacts
              uses: actions/download-artifact@v4
              with:
                  name: circuit-cpp
                  path: wallet-unit-poc/circom/build/cpp/

            - name: Download cert_chain_rs2048 R1CS artifact
              uses: actions/download-artifact@v4
              with:
                  name: circuit-r1cs-cert-chain-rs2048
                  path: wallet-unit-poc/circom/build/cert_chain_rs2048/cert_chain_rs2048_js/

            - name: Download cert_chain_rs4096 R1CS artifact
              uses: actions/download-artifact@v4
              with:
                  name: circuit-r1cs-cert-chain-rs4096
                  path: wallet-unit-poc/circom/build/cert_chain_rs4096/cert_chain_rs4096_js/

            - name: Download device_sig_rs2048 R1CS artifact
              uses: actions/download-artifact@v4
              with:
                  name: circuit-r1cs-device-sig-rs2048
                  path: wallet-unit-poc/circom/build/device_sig_rs2048/device_sig_rs2048_js/

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install --yes \
                    build-essential \
                    libgmp-dev \
                    libsodium-dev \
                    nasm \
                    nlohmann-json3-dev

            - name: Set up Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Cargo registry and git
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                  key: rust-tests-cargo-${{ hashFiles('wallet-unit-poc/ecdsa-spartan2/Cargo.lock') }}
                  restore-keys: |
                      rust-tests-cargo-

            # === cert-chain RSA-2048 issuer + device-sig RSA-2048 user ===

            - name: Generate split inputs (RS2048)
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  RUST_LOG=info cargo run --release -- generate-split-input

            - name: Run e2e flow — cert-chain (RS2048)
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  cargo run --release --features cert_chain_rs2048 -- cert-chain setup --input ../circom/inputs/cert_chain_rs2048/input.json
                  cargo run --release --features cert_chain_rs2048 -- cert-chain prove --input ../circom/inputs/cert_chain_rs2048/input.json
                  cargo run --release --features cert_chain_rs2048 -- cert-chain verify

            - name: Run e2e flow — device-sig (RS2048)
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  cargo run --release --features device_sig_rs2048 -- device-sig setup --input ../circom/inputs/device_sig_rs2048/input.json
                  cargo run --release --features device_sig_rs2048 -- device-sig prove --input ../circom/inputs/device_sig_rs2048/input.json
                  cargo run --release --features device_sig_rs2048 -- device-sig verify

            - name: Link-verify (RS2048)
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  RUST_LOG=info cargo run --release -- link-verify

            # === cert-chain 4096-bit issuer + device-sig 2048-bit user ===

            - name: Generate split inputs (RS4096)
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  RUST_LOG=info cargo run --release -- generate-split-input --cert-chain-4096

            - name: Run e2e flow — cert-chain (RS4096)
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  cargo run --release --features cert_chain_rs4096 -- cert-chain setup --cert-chain-4096 --input ../circom/inputs/cert_chain_rs4096/input.json
                  cargo run --release --features cert_chain_rs4096 -- cert-chain prove --cert-chain-4096 --input ../circom/inputs/cert_chain_rs4096/input.json
                  cargo run --release --features cert_chain_rs4096 -- cert-chain verify --cert-chain-4096

            - name: Run e2e flow — device-sig (RS4096 chain)
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  cargo run --release --features device_sig_rs2048 -- device-sig setup --input ../circom/inputs/device_sig_rs4096chain/input.json
                  cargo run --release --features device_sig_rs2048 -- device-sig prove --input ../circom/inputs/device_sig_rs4096chain/input.json
                  cargo run --release --features device_sig_rs2048 -- device-sig verify

            - name: Link-verify (RS4096)
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  RUST_LOG=info cargo run --release -- link-verify --cert-chain-4096

            # === Unit tests ===

            - name: Run ecdsa-spartan2 unit tests
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2
                  cargo test --release

            # === Release artifacts ===

            - name: Create ZIP of cert_chain_rs2048 keys
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2/keys
                  zip cert_chain_rs2048_proving.key.zip cert_chain_rs2048_proving.key
                  zip cert_chain_rs2048_verifying.key.zip cert_chain_rs2048_verifying.key

            - name: Create ZIP of cert_chain_rs4096 keys
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2/keys
                  zip cert_chain_rs4096_proving.key.zip cert_chain_rs4096_proving.key
                  zip cert_chain_rs4096_verifying.key.zip cert_chain_rs4096_verifying.key

            - name: Create ZIP of device_sig_rs2048 keys
              run: |
                  cd wallet-unit-poc/ecdsa-spartan2/keys
                  zip device_sig_rs2048_proving.key.zip device_sig_rs2048_proving.key
                  zip device_sig_rs2048_verifying.key.zip device_sig_rs2048_verifying.key

            - name: Create ZIP of R1CS artifacts
              run: |
                  cd wallet-unit-poc/circom/build/cert_chain_rs2048/cert_chain_rs2048_js
                  zip -r cert_chain_rs2048.r1cs.zip cert_chain_rs2048.r1cs
                  cd ../../cert_chain_rs4096/cert_chain_rs4096_js
                  zip -r cert_chain_rs4096.r1cs.zip cert_chain_rs4096.r1cs
                  cd ../../device_sig_rs2048/device_sig_rs2048_js
                  zip -r device_sig_rs2048.r1cs.zip device_sig_rs2048.r1cs

            - name: Upload key ZIPs to GitHub Release
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest
                  files: |
                      wallet-unit-poc/ecdsa-spartan2/keys/cert_chain_rs2048_proving.key.zip
                      wallet-unit-poc/ecdsa-spartan2/keys/cert_chain_rs2048_verifying.key.zip
                      wallet-unit-poc/ecdsa-spartan2/keys/cert_chain_rs4096_proving.key.zip
                      wallet-unit-poc/ecdsa-spartan2/keys/cert_chain_rs4096_verifying.key.zip
                      wallet-unit-poc/ecdsa-spartan2/keys/device_sig_rs2048_proving.key.zip
                      wallet-unit-poc/ecdsa-spartan2/keys/device_sig_rs2048_verifying.key.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload R1CS ZIPs to GitHub Release
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest
                  files: |
                      wallet-unit-poc/circom/build/cert_chain_rs2048/cert_chain_rs2048_js/cert_chain_rs2048.r1cs.zip
                      wallet-unit-poc/circom/build/cert_chain_rs4096/cert_chain_rs4096_js/cert_chain_rs4096.r1cs.zip
                      wallet-unit-poc/circom/build/device_sig_rs2048/device_sig_rs2048_js/device_sig_rs2048.r1cs.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
